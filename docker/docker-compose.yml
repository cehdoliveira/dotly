services:
  dotly:
    build: ./interface/
    container_name: dotly
    restart: unless-stopped
    environment:
      - ENABLE_CRON=true
    depends_on:
      - mysql
      - redis
      - kafka
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -H 'Host: dotly.local' http://localhost/ >/dev/null && curl -sf -H 'Host: manager.dotly.local' http://localhost/ >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ../_data/logs/:/var/log/
      - ../_data/upload/:/var/www/app/site/public_html/assets/upload/
      - ../_data/upload/:/var/www/app/manager/public_html/assets/upload/
      - ../site/public_html/:/var/www/app/site/public_html/
      - ../site/app/:/var/www/app/site/app/
      - ../site/cgi-bin/:/var/www/app/site/cgi-bin/
      - ../site/tests/:/var/www/app/site/tests/
      - ../site/phpunit.xml:/var/www/app/site/phpunit.xml
      - ../site/phpstan.neon:/var/www/app/site/phpstan.neon
      - ../manager/public_html/:/var/www/app/manager/public_html/
      - ../manager/app/:/var/www/app/manager/app/
      - ../manager/cgi-bin/:/var/www/app/manager/cgi-bin/
      - ../manager/tests/:/var/www/app/manager/tests/
      - ../manager/phpunit.xml:/var/www/app/manager/phpunit.xml
      - ../manager/phpstan.neon:/var/www/app/manager/phpstan.neon
      - ../migrations/:/var/www/app/migrations/
    ports:
      - "80:80"
    networks:
      dotly:
        ipv4_address: 172.29.0.3
  # Data Layer
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    command: --sql_mode="STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ../_data/mysql-data/:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    expose:
      - "3306"
    networks:
      dotly:
        ipv4_address: 172.29.0.2

  # Cache Layer
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: always
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - ../_data/redis-data/:/data
    ports:
      - "127.0.0.1:6379:6379"
    expose:
      - "6379"
    networks:
      dotly:
        ipv4_address: 172.29.0.4
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Message Broker Layer
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - ../_data/kafka-data/:/var/lib/kafka/data
    ports:
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:9093:9093"
    expose:
      - "9092"
      - "9093"
    networks:
      dotly:
        ipv4_address: 172.29.0.5
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka_ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka_ui
    restart: always
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: dotly_cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "false"
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      dotly:
        ipv4_address: 172.29.0.6
networks:
  dotly:
    ipam:
      driver: default
      config:
        - subnet: 172.29.0.0/16
