# O container da app so e alcancavel dentro da rede overlay "dotskynet" (sem
# porta publicada); o Traefik e o unico ponto de borda e ja envia o IP real do
# cliente em X-Forwarded-For. Aqui dizemos ao nginx pra confiar nesse header
# SOMENTE quando a conexao TCP vier de dentro dessa rede, e reescrever
# $remote_addr/REMOTE_ADDR a partir dele. Sem isto, REMOTE_ADDR e sempre o IP
# do Traefik (nao confiavel) — ver plano 031 (fraude no webhook InfinitePay).
#
# CIDR real da rede dotskynet (Swarm), confirmado via:
#   docker network inspect dotskynet --format '{{range .IPAM.Config}}{{.Subnet}}{{end}}'
set_real_ip_from 10.0.1.0/24;
real_ip_header X-Forwarded-For;

server {
    listen 80;
    server_name manager.dotly.local gerenciador-dotly.dotsky.com.br;

    root /var/www/dotly/manager/public_html;
    index index.php;

    # Limite de corpo da requisição. Sem isto o nginx corta em 1M (413) antes do
    # PHP; alinhado ao post_max_size do php.ini (12M) — o app ainda valida em 10M.
    client_max_body_size 12m;

    # Segurança
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Logs
    access_log /dev/stdout;
    error_log /var/log/manager-error.log notice;

    # Arquivos estáticos inexistentes -> 404
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|avif|css|js|woff|woff2|ttf|eot|otf|pdf|map|txt)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Desabilitar listagem de diretório e arquivos ocultos
    location ~ /\. {
        deny all;
    }

    # Router principal — PHP
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ^~ /assets/upload/ {
        if ($uri ~ "/\.") {
            return 404;
        }
        try_files $uri =404;
    }

    location ~ [^/]\.php(/|$) {
        try_files $fastcgi_script_name =404;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
    }

    # Compressão Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/ttf font/otf font/woff2 image/svg+xml application/x-font-ttf application/x-font-woff application/font-woff2 application/vnd.ms-fontobject;

    # Desabilitar ETag
    etag off;
}

